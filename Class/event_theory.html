1️. jQuery – Use

-jQuery is a JavaScript library.
-It makes JavaScript easier and shorter to write.
-It is mainly used for:

Handling events

DOM manipulation

Animations

AJAX requests

It reduces the amount of code needed.

2️⃣ event.type

It tells what type of event occurred.

Example: click, mouseover, keydown.

It returns the name of the event as a string.

3️⃣ event.timeStamp

It gives the time when the event happened.

The value is in milliseconds.

It helps to know when the event was triggered.

4️⃣ event.defaultPrevented

It checks whether the default action of an element is prevented.

If preventDefault() is used → it returns true.

If not used → it returns false.

5️⃣ event.target

It tells which element actually triggered the event.

It shows the original element where the event occurred.

6️⃣ event.srcElement (Source Element)

It is similar to event.target.

It tells the element that started the event.

It is an older property (mainly used in older browsers).

7️⃣ event.currentTarget

It tells the element on which the event listener is attached.

Difference:

target → where event happened.

currentTarget → where event handler is attached.

8️⃣ event.clientX and event.clientY

These give the mouse position inside the browser window.

clientX → horizontal position.

clientY → vertical position.

9️⃣ event.screenX and event.screenY

These give the mouse position according to the full screen (monitor).

screenX → horizontal screen position.

screenY → vertical screen position.

🔟 event.altKey

It checks whether the Alt key was pressed during the event.

Returns true or false.

1️⃣1️⃣ event.ctrlKey

It checks whether the Ctrl key was pressed.

Returns true or false.

1️⃣2️⃣ event.shiftKey

It checks whether the Shift key was pressed.

Returns true or false.
