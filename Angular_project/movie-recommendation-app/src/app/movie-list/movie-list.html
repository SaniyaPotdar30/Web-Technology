<!-- movie-list.component.html -->
<div class="container">
  <h1>Movie Storage</h1>
  <p class="subtitle">Browse and Store great movies</p>

  <button class="btn-primary" (click)="goToAddMovie()">+ Add New Movie</button>

  <!-- Simple HTML table to display all movies -->
  <table *ngIf="movies.length > 0">
    <thead>
      <tr>
        <th>#</th>
        <th>Title</th>
        <th>Genre</th>
        <th>Rating</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody>
      <!-- *ngFor loops through each movie in the movies array -->
      <tr *ngFor="let movie of movies">
        <td>{{ movie.id }}</td>
        <td>{{ movie.title }}</td>
        <td>{{ movie.genre }}</td>
        <td>{{ movie.rating }} / 10</td>
        <!-- (click) event binding to navigate to movie detail -->
        <td><button class="btn-detail" (click)="viewDetails(movie.id)">View Details</button></td>
      </tr>
    </tbody>
  </table>

  <!-- *ngIf shows this message only when the movies list is empty -->
  <p class="no-movies" *ngIf="movies.length === 0">
    No movies found. Click "Add New Movie" to get started!
  </p>
</div>
